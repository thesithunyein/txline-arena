<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f766e" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="64" fill="url(#bg)" filter="url(#dropShadow)"/>

  <!--
    Four rounded bars rising upward.
    Represents signal strength, trading edge, and agent performance.
  -->
  <g transform="translate(46, 68)">
    <!-- Bar 1 -->
    <rect x="0" y="72" width="28" height="48" rx="14" fill="url(#bar)" opacity="0.7"/>
    <!-- Bar 2 -->
    <rect x="34" y="44" width="28" height="76" rx="14" fill="url(#bar)" opacity="0.85"/>
    <!-- Bar 3 -->
    <rect x="68" y="24" width="28" height="96" rx="14" fill="url(#bar)" opacity="0.95"/>
    <!-- Bar 4 (accent) -->
    <rect x="102" y="0" width="28" height="120" rx="14" fill="url(#accentBar)"/>
  </g>

  <!-- Soft glow on the tallest bar -->
  <circle cx="164" cy="68" r="10" fill="#5eead4" opacity="0.3"/>
</svg>
