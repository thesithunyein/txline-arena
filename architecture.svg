<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 840" width="640" height="840">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="boxData" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="boxEngine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="boxAgent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="boxChain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="boxInnovation" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="boxUI" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowChain" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrowSide" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="640" height="840" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="320" y="32" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">TxLINE Arena Architecture</text>

  <!-- 1. Data Feed -->
  <text x="320" y="62" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#475569">1. TxLINE Data Feed</text>
  <rect x="80" y="76" width="150" height="48" rx="10" fill="url(#boxData)"/>
  <text x="155" y="95" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="white">TxLINE REST API</text>
  <text x="155" y="111" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#bfdbfe">fixtures + odds</text>
  <rect x="245" y="76" width="150" height="48" rx="10" fill="url(#boxData)"/>
  <text x="320" y="95" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="white">SSE Streams</text>
  <text x="320" y="111" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#bfdbfe">odds + scores</text>
  <rect x="410" y="76" width="150" height="48" rx="10" fill="url(#boxData)"/>
  <text x="485" y="95" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="white">stat-validation</text>
  <text x="485" y="111" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#bfdbfe">verify outcome</text>

  <!-- 2. Detection Engine -->
  <text x="320" y="162" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#475569">2. Detection Engine</text>
  <rect x="160" y="176" width="320" height="62" rx="10" fill="url(#boxEngine)"/>
  <text x="320" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Sharp Movement Detector</text>
  <text x="320" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cffafe">Z-score + % change on 20-tick rolling window</text>

  <!-- 3. Agent Arena -->
  <text x="320" y="268" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#475569">3. Agent Arena — 4 Strategies</text>
  <rect x="50" y="282" width="130" height="54" rx="10" fill="url(#boxAgent)"/>
  <text x="115" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Momentum</text>
  <text x="115" y="318" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ddd6fe">follow smart money</text>
  <text x="115" y="330" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ddd6fe">entry / exit</text>

  <rect x="200" y="282" width="130" height="54" rx="10" fill="url(#boxAgent)"/>
  <text x="265" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Mean Reversion</text>
  <text x="265" y="318" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ddd6fe">fade sharp moves</text>
  <text x="265" y="330" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ddd6fe">overreaction</text>

  <rect x="350" y="282" width="130" height="54" rx="10" fill="url(#boxAgent)"/>
  <text x="415" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Value</text>
  <text x="415" y="318" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ddd6fe">mispriced vs consensus</text>
  <text x="415" y="330" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ddd6fe">edge vs market</text>

  <rect x="500" y="282" width="130" height="54" rx="10" fill="url(#boxAgent)"/>
  <text x="565" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Market Maker</text>
  <text x="565" y="318" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ddd6fe">spread / liquidity</text>
  <text x="565" y="330" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ddd6fe">microstructure</text>

  <!-- 4. Risk Layer -->
  <text x="320" y="368" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#475569">4. Risk Layer</text>
  <rect x="160" y="382" width="320" height="54" rx="10" fill="#be185d"/>
  <text x="320" y="405" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Circuit Breaker</text>
  <text x="320" y="425" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fecdd3">Auto-pause any agent after 3 consecutive losses</text>

  <!-- 5. Settlement Layer -->
  <text x="320" y="468" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#475569">5. On-Chain Settlement</text>
  <rect x="160" y="482" width="320" height="54" rx="10" fill="url(#boxChain)"/>
  <text x="320" y="505" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Deterministic Settlement</text>
  <text x="320" y="525" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#99f6e4">TxLINE stat-validation + SHA-256 canonical hash</text>

  <rect x="160" y="552" width="320" height="54" rx="10" fill="#0f172a"/>
  <text x="320" y="575" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#5eead4">SPL Memo Program</text>
  <text x="320" y="595" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#5eead4">Anchor on Solana Devnet</text>

  <rect x="160" y="622" width="320" height="48" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="320" y="642" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#93c5fd">Solana Explorer</text>
  <text x="320" y="660" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#93c5fd">Publicly verifiable transaction</text>

  <!-- 6. Innovation Layer (side) -->
  <text x="520" y="468" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#475569">6. Innovation</text>
  <rect x="500" y="482" width="150" height="80" rx="10" fill="url(#boxInnovation)"/>
  <text x="575" y="505" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="white">Smart Money</text>
  <text x="575" y="520" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="white">Consensus</text>
  <text x="575" y="540" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffedd5">0-100 alignment</text>

  <rect x="500" y="575" width="150" height="80" rx="10" fill="url(#boxInnovation)"/>
  <text x="575" y="598" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="white">Performance</text>
  <text x="575" y="613" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="white">Attribution</text>
  <text x="575" y="633" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ffedd5">P&amp;L by signal</text>

  <!-- 7. Presentation -->
  <text x="320" y="696" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#475569">7. Presentation</text>
  <rect x="60" y="710" width="160" height="54" rx="10" fill="url(#boxUI)"/>
  <text x="140" y="733" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Express API</text>
  <text x="140" y="751" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1">REST + WebSocket</text>

  <rect x="240" y="710" width="160" height="54" rx="10" fill="url(#boxUI)"/>
  <text x="320" y="733" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Next.js Dashboard</text>
  <text x="320" y="751" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1">Real-time UI</text>

  <rect x="420" y="710" width="160" height="54" rx="10" fill="url(#boxUI)"/>
  <text x="500" y="733" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Telegram Alerts</text>
  <text x="500" y="751" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cbd5e1">Signal + Settlement</text>

  <!-- Arrows: main flow -->
  <!-- Data -> Detection -->
  <path d="M 320 124 L 320 176" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Detection -> Agents -->
  <path d="M 320 238 L 320 282" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Agents -> Circuit Breaker -->
  <path d="M 320 336 L 320 382" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Circuit Breaker -> Settlement -->
  <path d="M 320 436 L 320 482" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Settlement -> Memo -->
  <path d="M 320 536 L 320 552" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrowChain)"/>
  <!-- Memo -> Explorer -->
  <path d="M 320 606 L 320 622" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Explorer -> Presentation -->
  <path d="M 320 670 L 320 710" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Side arrows to Innovation -->
  <path d="M 480 309 L 500 522" fill="none" stroke="#f97316" stroke-width="2" marker-end="url(#arrowSide)"/>
  <path d="M 480 409 L 500 615" fill="none" stroke="#f97316" stroke-width="2" marker-end="url(#arrowSide)"/>

  <!-- stat-validation -> Settlement -->
  <path d="M 485 124 L 485 482" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
</svg>
